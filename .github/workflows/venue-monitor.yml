name: Venue Monitor

env:
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

on:
  schedule:
    # Every Sunday at 6am UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  monitor-venues:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run venue discovery
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
        run: node scripts/monitor-new-saunas.js

      - name: Verify build
        id: build_check
        run: npm run build
        continue-on-error: true

      - name: Revert and notify if build failed
        if: steps.build_check.outcome == 'failure'
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
        run: |
          echo "Build failed — saving proposed changes and reverting venues.ts"
          git diff src/data/venues.ts > scripts/new-venues-found.txt
          git checkout src/data/venues.ts
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Thermae Venue Bot"
          git add scripts/new-venues-found.txt
          if ! git diff --staged --quiet; then
            git commit -m "Venue discovery (build failed — manual review needed): $(date +'%Y-%m-%d')"
            git push
          fi
          node -e "
            const nodemailer = require('nodemailer');
            const fs = require('fs');
            const diff = fs.existsSync('scripts/new-venues-found.txt') ? fs.readFileSync('scripts/new-venues-found.txt', 'utf8') : '(no diff captured)';
            const transporter = nodemailer.createTransport({
              host: 'smtp.zoho.eu', port: 465, secure: true,
              auth: { user: process.env.ZOHO_EMAIL, pass: process.env.ZOHO_PASSWORD }
            });
            transporter.sendMail({
              from: process.env.ZOHO_EMAIL,
              to: process.env.ZOHO_EMAIL,
              subject: '[Thermae] Build failed — venues need manual review',
              text: 'The venue monitor found new venues but npm run build failed.\n\nProposed changes have been saved to scripts/new-venues-found.txt in the repo.\nPlease review and apply manually.\n\n--- DIFF ---\n' + diff
            }).then(() => console.log('Notification email sent')).catch(e => console.error('Email failed:', e.message));
          "

      - name: Commit and push new venues
        if: steps.build_check.outcome == 'success'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Thermae Venue Bot"
          git add -A
          if git diff --staged --quiet; then
            echo "No new venues to commit this week."
          else
            git commit -m "Auto venue discovery: $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Trigger Netlify rebuild
        if: steps.build_check.outcome == 'success'
        run: curl -X POST -d '' ${{ secrets.NETLIFY_BUILD_HOOK }}
