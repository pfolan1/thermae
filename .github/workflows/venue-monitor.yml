name: Venue Monitor

env:
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

on:
  schedule:
    # Every Sunday at 6am UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  monitor-venues:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run venue discovery
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
        run: node scripts/monitor-new-saunas.js

      - name: Commit and push new venues
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Thermae Venue Bot"
          git add -A
          if git diff --staged --quiet; then
            echo "No new venues to commit this week."
          else
            git commit -m "Auto venue discovery: $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Trigger Netlify rebuild
        run: curl -X POST -d '' ${{ secrets.NETLIFY_BUILD_HOOK }}
