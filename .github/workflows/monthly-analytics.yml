name: Monthly Analytics Report

on:
  schedule:
    # 1st of every month at 8am UTC
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate monthly analytics report
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
        run: node scripts/analytics/generate-monthly-report.js

      - name: Commit snapshot and report
        run: |
          git config user.name "Thermae Analytics Bot"
          git config user.email "hello@thermae.app"
          git add scripts/analytics/snapshots/ scripts/analytics/reports/
          if git diff --staged --quiet; then
            echo "No new snapshot changes to commit."
          else
            MONTH=$(date +'%B %Y')
            git commit -m "analytics: add monthly snapshot and report for ${MONTH}"
            git push
          fi
