name: Dedup Check

on:
  schedule:
    # 9am UTC on the 8th and 22nd of every month
    - cron: '0 9 8,22 * *'
  workflow_dispatch:

jobs:
  dedup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dedup check
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
        run: node scripts/dedup-check.js

      - name: Commit dedup report
        run: |
          git config user.name "Thermae Dedup Bot"
          git config user.email "hello@thermae.app"
          git add scripts/analytics/dedup-reports/
          if git diff --staged --quiet; then
            echo "No new report to commit."
          else
            DATE=$(date +'%Y-%m-%d')
            git commit -m "dedup: add report for ${DATE}"
            git push
          fi
