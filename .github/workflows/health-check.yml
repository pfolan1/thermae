name: Weekly Health Check

env:
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

on:
  schedule:
    # Every Sunday at 7am UTC
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run health check
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
        run: node scripts/weekly-health-check.js

      - name: Save dated health report
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p scripts/analytics/health-reports
          cp scripts/health-report.txt "scripts/analytics/health-reports/${DATE}-health-report.txt"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "scripts/analytics/health-reports/${DATE}-health-report.txt"
          git diff --staged --quiet || git commit -m "chore: health report ${DATE}"
          git push

      - name: Create GitHub issue for dead links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEAD=$(grep -E '^\s+\[DEAD\s+HTTP 404' scripts/health-report.txt || true)
          if [ -n "$DEAD" ]; then
            DATE=$(date +%Y-%m-%d)
            BODY="## Dead links found in health check ${DATE}

          The following venues returned HTTP 404 and need manual review:

          \`\`\`
          $(grep -A2 '\[DEAD.*404' scripts/health-report.txt || echo 'See full report')
          \`\`\`

          Full report: \`scripts/analytics/health-reports/${DATE}-health-report.txt\`

          For each venue: update the bookingUrl or set \`open:false\` in venues.ts."
            gh issue create \
              --title "⚠️ Dead links detected — health check ${DATE}" \
              --body "$BODY" \
              --label "bug" || true
          fi
