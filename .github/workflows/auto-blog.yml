name: Auto Blog Post

on:
  schedule:
    # Every Monday at 5am UTC (6am BST). Script checks whether this Monday
    # is a scheduled publish date from scripts/blog-schedule.json.
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force generate even if today is not a scheduled date'
        required: false
        default: 'false'

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_GENERATE: ${{ github.event.inputs.force }}
        run: node scripts/generate-blog-post.js

      - name: Commit and push new blog post
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Thermae Auto Blog"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit — no post was due today."
          else
            git commit -m "Auto blog post: $(date +'%Y-%m-%d')"
            git push
          fi
